    - ICD Service: api/icd-service.md
    - Lab Service: api/lab-service.md
    - Guideline Service: api/guideline-service.md
  - 管理後台:
    - admin/index.md
    - 背景工作與排程: admin/jobs-and-worker.md
  - 部署:
    - deployment/index.md
    - 架構與容器部署: architecture/deployment.md
    - 環境變數配置: deployment/configuration.md
    - 效能與監控: deployment/performance.md
    - 資料處理附錄 (DPA): deployment/dpa.md
    - 隱私政策頁面: deployment/privacy.md
