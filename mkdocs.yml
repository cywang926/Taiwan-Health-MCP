site_name: Taiwan ICD10 Health MCP
site_description: 台灣醫療健康資料整合 MCP 伺服器 - 技術文件
site_author: Taiwan-ICD10-Health-MCP Team
site_url: https://audi0417.github.io/Taiwan-Health-MCP

repo_name: Taiwan-ICD10-Health-MCP
repo_url: https://github.com/audi0417/Taiwan-Health-MCP
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 Taiwan-ICD10-Health-MCP Team

theme:
  name: material
  language: zh-TW

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首頁:
    - index.md
    - 快速開始: getting-started.md
  - 資料來源:
    - data-sources/index.md
  - API 參考:
    - api/index.md
    - FHIR Services API: api/fhir-services.md
  - 開發指南:
    - development/index.md
  - 部署:
    - deployment/index.md
  - 常見問題:
    - faq/index.md
