site_name: Taiwan ICD10 Health MCP
site_description: 台灣醫療健康資料整合 MCP 伺服器 - 技術文件
site_author: Taiwan-ICD10-Health-MCP Team
site_url: https://audi0417.github.io/Taiwan-Health-MCP

repo_name: Taiwan-ICD10-Health-MCP
repo_url: https://github.com/audi0417/Taiwan-Health-MCP
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 Taiwan-ICD10-Health-MCP Team

theme:
  name: material
  language: zh-TW

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首頁:
    - index.md
    - 快速開始: getting-started.md
  - 模組:
    - ICD-10: modules/icd-service.md
    - 藥品 / TFDA: modules/drug-service.md
    - 檢驗 / LOINC: modules/lab-service.md
    - SNOMED CT: modules/snomed-service.md
    - 臨床指引: modules/clinical-guideline-service.md
    - 健康補充品: modules/health-supplements-service.md
    - 食品營養: modules/food-nutrition-service.md
    - FHIR Condition: modules/fhir-condition-service.md
    - FHIR Medication: modules/fhir-medication-service.md
    - FHIR IG: modules/fhir-ig-service.md
  - MCP 工具:
    - ICD-10 工具: tools/icd-tools.md
    - 藥品工具: tools/drug-tools.md
    - 檢驗 / LOINC 工具: tools/lab-tools.md
    - SNOMED 工具: tools/snomed-tools.md
    - 臨床指引工具: tools/guideline-tools.md
    - 健康補充品工具: tools/health-supplements-tools.md
    - 食品營養工具: tools/nutrition-tools.md
    - FHIR Condition / Medication 工具: tools/fhir-tools.md
    - FHIR IG 工具: tools/fhir-ig-tools.md
    - FHIR 伺服器工具: tools/fhir-server-tools.md
  - 資料來源:
    - data-sources/index.md
    - ICD-10: data-sources/icd10.md
    - LOINC: data-sources/loinc.md
    - 臨床指引: data-sources/guidelines.md
  - FHIR 授權:
    - 授權流程說明: fhir-authoring-walkthrough.md
    - 工具集設計評估: fhir-ig-mcp-toolset-assessment.md
    - 資源轉換提示（自動判斷型別）: fhir-resource-conversion-prompt.md
    - Bundle 轉換提示: fhir-bundle-conversion-prompt.md
  - 使用指南:
