# Single front door for Taiwan Health MCP.
#   - API / MCP / WebSocket  -> Python backend (app:8000)
#   - everything else (pages, admin SPA) -> Next.js front-end (web:3000)
#
# Upstreams are resolved at *request time* via Docker's embedded DNS
# (127.0.0.11), not cached at startup. This means rebuilding `app`/`web`
# (which gives them a new container IP) no longer requires restarting nginx.
# The trick: never name them in an `upstream {}` block (those resolve once at
# load) — instead put the host:port in a variable and let `resolver` re-resolve
# it. NOTE: when `proxy_pass` uses a variable it does not append the matched
# location URI, but since no location here rewrites the path, nginx forwards the
# original request URI (and query string) unchanged.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 512m;   # admin source-file uploads

  # Docker embedded DNS; short TTL so a recreated container is picked up quickly.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $th_backend  "app:8000";
  set $th_frontend "web:3000";

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── admin live-log WebSocket ────────────────────────────────────────────────
  location = /admin/ws {
    proxy_pass http://$th_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── admin REST API ──────────────────────────────────────────────────────────
  location /admin/api/ {
    proxy_pass http://$th_backend;
    proxy_http_version 1.1;
    proxy_read_timeout 600s;
  }

  # ── MCP streamable-http (SSE) ───────────────────────────────────────────────
  location = /mcp {
    proxy_pass http://$th_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # ── other backend-owned endpoints ───────────────────────────────────────────
  location = /status.json   { proxy_pass http://$th_backend; }
  location = /openapi.json  { proxy_pass http://$th_backend; }
  location /tools/          { proxy_pass http://$th_backend; }
  location /fhir-client/    { proxy_pass http://$th_backend; }
  location /fhir-oauth/     { proxy_pass http://$th_backend; }

  # ── everything else: public pages + admin SPA (Next.js) ─────────────────────
  location / {
    proxy_pass http://$th_frontend;
    proxy_http_version 1.1;
    proxy_read_timeout 120s;
  }
}
